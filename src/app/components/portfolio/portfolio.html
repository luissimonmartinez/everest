      <!-- 3 columns -->
      @for (item of portfolioImages(); track $index) {
        <div class="col-md-4 gallery-item">
          <!-- abrir imagen en una nueva pestaña -->
          <a [href]="item.url" target="_blank" title="" class="img-zoom">
            <div class="gallery-box">
              <div class="gallery-img">
                 <img [src]="item.url" class="img-fluid mx-auto d-block" [alt]="item.name"/>
                </div>
            </div>
          </a>
        </div>
      }
      <div class="text-center">
        <a class="btn-curve btn-1 mt-30" (click)="openPageGallery()"><span>VER TODO</span></a>
